        construction_engineer: "김대성 — 불국사·석굴암, 천년 가는 시공"
        safety_manager: "사명대사 유정 — 임진왜란 의승군, 일본 포로 3500명 송환"
      special:
        bangbujang: "방부장 본인 (영감 보조: 김홍도 단원) — 자기참조, 하하의 가벼움"
    progress:
