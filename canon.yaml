      bridge_a: "dangun_consult_physis(task, persona, timeout) — 본 단군 시공 대기"
      bridge_b: "physis_escalate_dangun(issue, urgency, context) — 본 피지수 placeholder 봉안 완료 (mcp_server.py)"
