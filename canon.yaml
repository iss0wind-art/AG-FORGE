    spec_v0:
      origin: "D:/GIT/dream-fac/DANGUN_PHYSIS_BRIDGE_SPEC_v0.md (본영 단군 봉안 2026-04-25)"
      response: "D:/GIT/dream-fac/MCP_BRIDGE_SPEC_v0_RESPONSE_PHYSIS.md (피지수 봉안 2026-04-26)"
